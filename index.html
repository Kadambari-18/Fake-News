<!DOCTYPE html>
<html>
<head>
    <title>Home - Fake News Detector</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <style>
        /* FULL BACKGROUND IMAGE */
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;

            background: url("{{ url_for('static', filename='bg.jpg') }}") no-repeat center center/cover;
            color: white;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #00f7ff;
        }

        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #00f7ff;
        }

        /* CENTER CONTENT */
        .container {
            height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* GLASS BOX */
        .content-box {
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 60%;
        }

        .content-box h1 {
            font-size: 32px;
        }

        .content-box p {
            font-size: 18px;
            margin: 15px 0;
        }

        /* BUTTON */
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(90deg, #00f7ff, #00c3ff);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px #00f7ff;
        }
    </style>
</head>

<body>

<nav>
    <div class="logo">📰 Fake News Detector</div>
    <div class="nav-links">
        <a href="/home">Home</a>
        <a href="/detect">Detect</a>
        <a href="/history">History</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
    </div>
</nav>

<div class="container">
    <div class="content-box">
        <h1>Welcome to AI Fake News Detector</h1>
        <p>Analyze news articles using AI and detect fake information instantly.</p>

        <a href="/detect">
            <button>🚀 Start Detecting</button>
        </a>
    </div>
</div>

</body>
</html>
